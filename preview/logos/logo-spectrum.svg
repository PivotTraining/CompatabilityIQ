<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <rect width="400" height="150" fill="white"/>
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8735A"/>
      <stop offset="35%" stop-color="#7B68B5"/>
      <stop offset="100%" stop-color="#4CAF8A"/>
    </linearGradient>
    <linearGradient id="spectrumGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B68B5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4CAF8A" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Main wordmark -->
  <text x="30" y="72" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#2D2D3D" letter-spacing="-0.5">
    Compatible<tspan fill="#7B68B5" font-weight="700">IQ</tspan>
  </text>
  <!-- Spectrum bar underneath wordmark -->
  <rect x="30" y="86" width="305" height="4" rx="2" ry="2" fill="#EEEEEE"/>
  <rect x="30" y="86" width="305" height="4" rx="2" ry="2" fill="url(#spectrumGrad)" opacity="0.85"/>
  <!-- Score indicator dot -->
  <circle cx="268" cy="88" r="7" fill="white" stroke="#4CAF8A" stroke-width="2.5"/>
  <circle cx="268" cy="88" r="3" fill="#4CAF8A"/>
  <!-- Score labels -->
  <text x="30" y="108" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#BBB" letter-spacing="0.5">
    LOW
  </text>
  <text x="155" y="108" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#BBB" letter-spacing="0.5" text-anchor="middle">
    MODERATE
  </text>
  <text x="315" y="108" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" fill="#BBB" letter-spacing="0.5" text-anchor="end">
    HIGH
  </text>
  <!-- Small tick marks -->
  <line x1="30" y1="93" x2="30" y2="96" stroke="#CCC" stroke-width="1"/>
  <line x1="106" y1="93" x2="106" y2="96" stroke="#CCC" stroke-width="1"/>
  <line x1="182" y1="93" x2="182" y2="96" stroke="#CCC" stroke-width="1"/>
  <line x1="258" y1="93" x2="258" y2="96" stroke="#CCC" stroke-width="1"/>
  <line x1="335" y1="93" x2="335" y2="96" stroke="#CCC" stroke-width="1"/>
  <!-- Percentage label near indicator -->
  <text x="268" y="78" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#4CAF8A" font-weight="600" text-anchor="middle">
    87%
  </text>
</svg>