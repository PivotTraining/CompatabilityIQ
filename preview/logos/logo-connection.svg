<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <rect width="400" height="150" fill="white"/>
  <defs>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B68B5"/>
      <stop offset="100%" stop-color="#4CAF8A"/>
    </linearGradient>
  </defs>
  <!-- Two interlocking circles/rings symbolizing compatibility -->
  <g transform="translate(55, 75)">
    <!-- Left circle -->
    <circle cx="-12" cy="0" r="28" stroke="#7B68B5" stroke-width="4" fill="none"/>
    <!-- Right circle -->
    <circle cx="12" cy="0" r="28" stroke="#4CAF8A" stroke-width="4" fill="none"/>
    <!-- Overlap highlight - lens shape -->
    <path d="M 3.5 -27 A 28 28 0 0 1 3.5 27 A 28 28 0 0 1 3.5 -27 Z" fill="none"/>
    <!-- Small dots at intersection points -->
    <circle cx="0" cy="-20" r="3" fill="#E8735A"/>
    <circle cx="0" cy="20" r="3" fill="#E8735A"/>
    <!-- Connection arc through center -->
    <path d="M -12 -28 Q 0 0 12 -28" stroke="url(#connGrad)" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M -12 28 Q 0 0 12 28" stroke="url(#connGrad)" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="110" y="68" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#2D2D3D" letter-spacing="-0.5">
    Compatible<tspan fill="#7B68B5" font-weight="700">IQ</tspan>
  </text>
  <!-- Tagline -->
  <text x="110" y="92" font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#888" letter-spacing="2" font-weight="400">
    SCIENCE-DRIVEN COMPATIBILITY
  </text>
</svg>